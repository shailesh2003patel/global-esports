<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Admin Dashboard</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="main-container">

    <div class="header">
        <h1>Global eSports Admin</h1>
    </div>

    <div class="container">

        <form id="tournamentForm">

            <input
                type="text"
                id="title"
                placeholder="Tournament Title"
                required
            >

            <input
                type="text"
                id="game"
                placeholder="Game"
                required
            >

            <input
                type="text"
                id="mode"
                placeholder="Mode"
                required
            >

            <input
                type="text"
                id="map"
                placeholder="Map"
                required
            >

            <input
                type="text"
                id="date"
                placeholder="Date"
                required
            >

            <input
                type="text"
                id="time"
                placeholder="Time"
                required
            >

            <input
                type="number"
                id="prizePool"
                placeholder="Prize Pool"
                required
            >

            <input
                type="number"
                id="perKill"
                placeholder="Per Kill Reward"
                required
            >

            <input
                type="number"
                id="entryFee"
                placeholder="Entry Fee"
                required
            >

            <input
                type="number"
                id="maxPlayers"
                placeholder="Max Players"
                required
            >

            <input
                type="text"
                id="bannerImage"
                placeholder="Banner Image URL"
                required
            >

            <button type="submit">
                Create Tournament
            </button>

        </form>

    </div>

</div>

<script src="js/admin.js"></script>

</body>
</html>
